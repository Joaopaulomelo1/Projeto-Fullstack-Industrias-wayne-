<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wayne Industries — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 48px 40px;
            width: 360px;
            text-align: center;
        }

        .logo { font-size: 28px; font-weight: bold; color: #c0a060; letter-spacing: 2px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 32px; margin-top: 4px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
        }

        input:focus { outline: none; border-color: #c0a060; }

        button {
            width: 100%;
            padding: 12px;
            background: #c0a060;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background: #d4b476; }

        .error {
            background: #2a0a0a;
            border: 1px solid #600;
            color: #f88;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">WAYNE</div>
        <div class="subtitle">INDUSTRIES — SISTEMA INTERNO</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" required autofocus>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit">ENTRAR</button>
        </form>
    </div>
</body>
</html>
